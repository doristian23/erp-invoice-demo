name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build with relaxed strict mode
        run: |
          # Temporarily disable noPropertyAccessFromIndexSignature for build
          # (the repo has intentional training defects that cause strict-mode errors)
          node -e "
            const fs = require('fs');
            const ts = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
            ts.compilerOptions.noPropertyAccessFromIndexSignature = false;
            fs.writeFileSync('tsconfig.json', JSON.stringify(ts, null, 2));
          "
          npx ng build --base-href /erp-invoice-demo/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/erp-invoice-demo/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
